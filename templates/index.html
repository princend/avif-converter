<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圖片轉 AVIF 工具</title>
    <!-- 設定網頁 Favicon -->
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root {
            --primary: #0071e3;
            --primary-hover: #0077ED;
            --bg-color: #f5f5f7;
            --card-bg: rgba(255, 255, 255, 0.8);
            --text-main: #1d1d1f;
            --text-secondary: #86868b;
            --border: #d2d2d7;
            --danger: #ff3b30;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            padding: 40px;
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.5);
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 15px;
        }

        input[type="file"] {
            display: none;
        }

        .file-upload-btn {
            display: block;
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 2px dashed var(--border);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            color: var(--primary);
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .file-upload-btn:hover {
            border-color: var(--primary);
            background: rgba(0, 113, 227, 0.05);
        }

        .preview-container {
            min-height: 80px;
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 12px;
            background: #fff;
            margin-bottom: 24px;
        }

        .image-list {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
        }

        .empty-text {
            color: var(--text-secondary);
            font-size: 14px;
            text-align: center;
            width: 100%;
            padding: 20px 0;
        }

        .preview-item {
            position: relative;
            width: 80px;
            height: 80px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid var(--border);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .file-icon {
            width: 100%;
            height: 100%;
            background-color: #e5e5ea;
            border-radius: 8px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            text-transform: uppercase;
        }

        .delete-btn {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--danger);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 6px rgba(255, 59, 48, 0.4);
            transition: transform 0.2s ease;
        }

        .delete-btn:hover {
            transform: scale(1.1);
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 15px;
            transition: border-color 0.2s ease;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--primary);
        }

        .submit-btn {
            display: block;
            width: 100%;
            padding: 16px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(0, 113, 227, 0.3);
        }

        .submit-btn:hover:not(:disabled) {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(0, 113, 227, 0.4);
        }

        .submit-btn:disabled {
            background-color: var(--text-secondary);
            cursor: not-allowed;
            box-shadow: none;
            opacity: 0.7;
        }

        .status {
            margin-top: 24px;
            text-align: center;
            font-size: 15px;
            font-weight: 500;
            min-height: 20px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .status.error { color: var(--danger); }
        .status.success { color: #34c759; }

        /* Loader */
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .progress-container {
            display: none;
            margin-top: 16px;
        }
        
        .progress-text {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-align: center;
        }
        
        .progress-bar-bg {
            width: 100%;
            height: 8px;
            background-color: var(--border);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-bar-fill {
            height: 100%;
            background-color: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>圖片轉 AVIF 工具</h1>

        <div class="form-group">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <label style="margin-bottom: 0;">選擇圖片檔案 <span id="selectedCount" style="color: var(--primary); font-weight: 600; font-size: 14px; margin-left: 4px;"></span> <span style="color: var(--text-secondary); font-size: 13px; font-weight: normal;">(支援多選，單張圖片上限 50MB)</span></label>
                <button type="button" id="clearAllBtn" style="background: none; border: none; color: var(--danger); cursor: pointer; font-size: 13px; font-weight: 500; padding: 0; display: none;">全部清除</button>
            </div>
            <label for="fileInput" class="file-upload-btn" id="dropZone">
                點擊或拖曳檔案至此
            </label>
            <input type="file" id="fileInput" multiple accept="image/*,.heic,.bmp,.tiff" />
        </div>

        <div class="preview-container">
            <div id="imageList" class="image-list"></div>
        </div>

        <div class="form-group">
            <label for="qualityInput">壓縮品質 (0-100): <span id="qualityValue" style="color: var(--primary);">100</span></label>
            <input type="range" id="qualityInput" min="1" max="100" value="100" oninput="document.getElementById('qualityValue').innerText = this.value" />
        </div>

        <div class="form-group">
            <label for="zipFileNameInput">ZIP 檔名 (選填)</label>
            <input type="text" id="zipFileNameInput" placeholder="留空則自動產生時間戳記 (例如: my_images)" />
        </div>

        <button id="convertButton" class="submit-btn">轉換並下載 ZIP</button>

        <div id="progressContainer" class="progress-container">
            <div id="progressText" class="progress-text">準備中...</div>
            <div class="progress-bar-bg">
                <div id="progressBarFill" class="progress-bar-fill"></div>
            </div>
        </div>

        <div id="statusMessage" class="status"></div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const imageList = document.getElementById('imageList');
        const zipFileNameInput = document.getElementById('zipFileNameInput');
        const qualityInput = document.getElementById('qualityInput');
        const convertButton = document.getElementById('convertButton');
        const statusMessage = document.getElementById('statusMessage');
        const clearAllBtn = document.getElementById('clearAllBtn');

        let selectedFiles = [];

        clearAllBtn.addEventListener('click', () => {
            selectedFiles = [];
            fileInput.value = ''; // Reset input so same file can be selected again
            renderPreviews();
        });

        // 避免瀏覽器預設的拖曳開啟檔案行為
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
            document.body.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults (e) {
            e.preventDefault();
            e.stopPropagation();
        }

        // 增加拖曳時的視覺回饋
        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => {
                dropZone.style.borderColor = 'var(--primary)';
                dropZone.style.background = 'rgba(0, 113, 227, 0.05)';
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => {
                dropZone.style.borderColor = '';
                dropZone.style.background = '';
            }, false);
        });

        // 處理拖曳放下的檔案
        dropZone.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            let oversizedCount = 0;
            const newFiles = Array.from(dt.files).filter(file => {
                const isImage = file.type.startsWith('image/') || file.name.match(/\.(jpe?g|png|gif|webp|avif|bmp|heic|tiff?)$/i);
                if (isImage && file.size > 50 * 1024 * 1024) {
                    oversizedCount++;
                    return false;
                }
                return isImage;
            });
            if (oversizedCount > 0) {
                showMessage(`已略過 ${oversizedCount} 張超過 50MB 限制的圖片`, 'error');
            } else if (newFiles.length > 0) {
                showMessage('', '');
            }
            if (newFiles.length > 0) {
                selectedFiles = [...selectedFiles, ...newFiles];
                renderPreviews();
            }
        });

        fileInput.addEventListener('change', (e) => {
            let oversizedCount = 0;
            const newFiles = Array.from(e.target.files).filter(file => {
                if (file.size > 50 * 1024 * 1024) {
                    oversizedCount++;
                    return false;
                }
                return true;
            });
            if (oversizedCount > 0) {
                showMessage(`已略過 ${oversizedCount} 張超過 50MB 限制的圖片`, 'error');
            } else if (newFiles.length > 0) {
                showMessage('', '');
            }
            if (newFiles.length > 0) {
                selectedFiles = [...selectedFiles, ...newFiles];
                renderPreviews();
            }
            fileInput.value = ''; // Reset input so same file can be selected again
        });

        function renderPreviews() {
            imageList.innerHTML = '';
            const countSpan = document.getElementById('selectedCount');
            
            if (selectedFiles.length === 0) {
                imageList.innerHTML = '<div class="empty-text">尚未選擇任何圖片...</div>';
                clearAllBtn.style.display = 'none';
                if (countSpan) countSpan.innerText = '';
                return;
            }
            
            clearAllBtn.style.display = 'inline-block';
            if (countSpan) countSpan.innerText = `(已選擇 ${selectedFiles.length} 張)`;

            selectedFiles.forEach((file, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'preview-item';

                const isUnsupportedPreview = file.name.match(/\.(heic|tiff?)$/i);
                if (isUnsupportedPreview) {
                    const icon = document.createElement('div');
                    icon.className = 'file-icon';
                    icon.innerText = file.name.split('.').pop().toUpperCase();
                    wrapper.appendChild(icon);
                } else {
                    const img = document.createElement('img');
                    img.src = URL.createObjectURL(file);
                    wrapper.appendChild(img);
                }

                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-btn';
                deleteBtn.innerHTML = '&times;';
                
                deleteBtn.onclick = (e) => {
                    e.preventDefault();
                    selectedFiles.splice(index, 1);
                    renderPreviews();
                };

                wrapper.appendChild(deleteBtn);
                imageList.appendChild(wrapper);
            });
        }

        convertButton.addEventListener('click', async () => {
            if (selectedFiles.length === 0) {
                showMessage('請先選擇圖片檔案', 'error');
                return;
            }

            // 移除 50MB 限制，因為已改為前端單獨打包

            convertButton.disabled = true;
            convertButton.innerHTML = '<span class="loader"></span> 處理中...';
            showMessage('', ''); // Clear message

            const progressContainer = document.getElementById('progressContainer');
            const progressText = document.getElementById('progressText');
            const progressBarFill = document.getElementById('progressBarFill');
            progressContainer.style.display = 'block';
            
            const zip = new JSZip();
            let successCount = 0;
            let failCount = 0;
            let failedFiles = [];

            try {
                for (let i = 0; i < selectedFiles.length; i++) {
                    const file = selectedFiles[i];
                    progressText.innerText = `正在轉換 (${i + 1} / ${selectedFiles.length}): ${file.name}`;
                    progressBarFill.style.width = `${((i) / selectedFiles.length) * 100}%`;
                    
                    const formData = new FormData();
                    formData.append('file', file);
                    formData.append('quality', qualityInput.value);

                    const response = await fetch('/convert_single', {
                        method: 'POST',
                        body: formData
                    });

                    if (!response.ok) {
                        failCount++;
                        failedFiles.push(file.name);
                        continue;
                    }

                    const blob = await response.blob();
                    
                    let originalName = file.name;
                    let dotIndex = originalName.lastIndexOf('.');
                    let baseName = dotIndex !== -1 ? originalName.substring(0, dotIndex) : originalName;
                    zip.file(`${baseName}.avif`, blob);
                    
                    successCount++;
                    progressBarFill.style.width = `${((i + 1) / selectedFiles.length) * 100}%`;
                }
                
                if (successCount === 0) {
                    throw new Error('所有檔案轉換均失敗，請確認檔案格式是否正確。');
                }
                
                progressText.innerText = '正在打包 ZIP...';
                const zipContent = await zip.generateAsync({type: 'blob'});
                
                let zipName = zipFileNameInput.value.trim();
                if (!zipName) {
                    const date = new Date();
                    const timestamp = `${date.getFullYear()}${String(date.getMonth()+1).padStart(2,'0')}${String(date.getDate()).padStart(2,'0')}_${String(date.getHours()).padStart(2,'0')}${String(date.getMinutes()).padStart(2,'0')}${String(date.getSeconds()).padStart(2,'0')}`;
                    zipName = `converted_images_${timestamp}.zip`;
                } else if (!zipName.toLowerCase().endsWith('.zip')) {
                    zipName += '.zip';
                }
                
                saveAs(zipContent, zipName);
                
                let msg = '下載成功！';
                if (failCount > 0) {
                    msg += `\n(有 ${failCount} 個檔案轉換失敗：${failedFiles.join(', ')})`;
                }
                showMessage(msg, 'success');
                
            } catch (error) {
                showMessage(`發生錯誤: ${error.message}`, 'error');
            } finally {
                convertButton.disabled = false;
                convertButton.innerText = '轉換並下載 ZIP';
                setTimeout(() => { progressContainer.style.display = 'none'; }, 3000);
            }
        });

        function showMessage(text, type) {
            statusMessage.textContent = text;
            statusMessage.className = 'status ' + type;
        }

        // Initial setup
        renderPreviews();
    </script>
</body>
</html>
